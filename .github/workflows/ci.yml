# ================================================================
# Pipeline CI - MS-CATALOG-SERVICE
# Caso 15 - Plataforma de Reservas de Servicios
# Sprint 2: HU04-HU12
# ================================================================

name: CI - MS-Catalog-Service

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-catalog:
    name: Pruebas Unitarias y Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar MS-Catalog-Service
        run: mvn compile --no-transfer-progress

      - name: Ejecutar pruebas unitarias + reporte JaCoCo
        run: mvn test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: ""

      - name: Validar Quality Gate de cobertura (>= 40%)
        run: mvn verify --no-transfer-progress -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: ""

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-catalog
          path: target/site/jacoco/
          retention-days: 30

      - name: Análisis SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar
          -Dsonar.projectKey=JuanLema14_Reservas-MS-Catalog-Service
          -Dsonar.organization=juanlema14
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Resumen en GitHub
        if: always()
        run: |
          echo "## MS-Catalog-Service - Sprint 2" >> $GITHUB_STEP_SUMMARY
          echo "| HU | Descripción | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|----|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| HU04 | Creación de categorías | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU05 | Edición de categorías | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU06 | Soft Delete categoría | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU07 | Listar categorías | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU08 | Crear servicio | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU09 | Editar servicio | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU10 | Soft Delete servicio | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU11 | Listar servicios (Proveedor) | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU12 | Listar servicios (Cliente) | OK |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Reporte JaCoCo disponible en la pestaña **Artifacts**." >> $GITHUB_STEP_SUMMARY
